name: deploy

on:
  workflow_call:
  workflow_dispatch:
  push:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    strategy:
      matrix:
        platform:
          [
            { ci: "windows-latest", name: "win32-x64" },
            { ci: "ubuntu-latest", name: "linux-x64" },
          ]
    runs-on: ${{ matrix.platform.ci }}
    environment: deploy
    steps:
      - name: Setup ci
        run: |
          git config --global user.name "Github Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies and run postinstall
        run: pnpm install

      - name: Build native module
        run: pnpm run build

      - name: Copy artifacts
        run: cp lib/native/dist/binding.node prebuilts/${{ matrix.platform.name }} && cp lib/native/dist/binding.d.ts prebuilts/${{ matrix.platform.name }}

      - name: Pack package
        run: pnpm pack --filter @tosuapp/lazer-calculator-${{ matrix.platform.name }} --out prebuilt.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "tosu-lazer-calculator-${{ matrix.platform.name }}"
          path: prebuilt.tgz
